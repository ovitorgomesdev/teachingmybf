<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluency</title>
<style>
:root {
  --cream:#FAF8F4; --warm-white:#F5F2EC; --stone:#E8E2D9; --sand:#D4C9B8;
  --warm-gray:#9E9080; --dark-brown:#2C2416; --mid-brown:#5C4E38;
  --accent:#B85C38; --accent-light:#E8855F; --accent-pale:#F5E0D6;
  --gold:#C9972A; --gold-pale:#F5EDD3; --teal:#2D6B6B; --teal-pale:#D4ECEC;
  --success:#3D7A5C; --success-pale:#D4EDE1;
  --teacher:#4A3080; --teacher-pale:#EDE4F5; --teacher-light:#7B5FC0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--cream);color:var(--dark-brown);min-height:100vh;}
.screen{display:none;min-height:100vh;} .screen.active{display:flex;}

#login-screen{background:var(--dark-brown);align-items:center;justify-content:center;}
.login-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:48px;width:420px;max-width:calc(100vw - 32px);}
.login-logo{font-size:34px;font-weight:300;color:white;margin-bottom:4px;letter-spacing:-1px;}
.login-logo span{color:var(--accent-light);font-style:italic;}
.login-tagline{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.login-tabs{display:flex;gap:4px;background:rgba(255,255,255,.07);border-radius:10px;padding:4px;margin-bottom:24px;}
.login-tab{flex:1;padding:9px;border:none;border-radius:7px;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.45);transition:all .2s;font-family:inherit;}
.login-tab.active{background:rgba(255,255,255,.13);color:white;}
.login-tab.t-tab.active{background:var(--teacher);color:white;}
.fl{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:7px;font-weight:500;}
.fi-login{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:12px 15px;color:white;font-size:14px;outline:none;margin-bottom:16px;font-family:inherit;}
.fi-login:focus{border-color:var(--accent-light);}
.fi-login::placeholder{color:rgba(255,255,255,.2);}
.btn-login{width:100%;padding:13px;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;color:white;font-family:inherit;}
.btn-s{background:var(--accent);} .btn-s:hover{background:var(--accent-light);}
.btn-t{background:var(--teacher);} .btn-t:hover{background:var(--teacher-light);}
.login-hint{font-size:11px;color:rgba(255,255,255,.2);text-align:center;margin-top:14px;}
.login-error{font-size:12px;color:#FF8A80;text-align:center;margin-bottom:10px;display:none;}

#app-screen{flex-direction:row;}
.sidebar{width:252px;min-width:252px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-student{background:var(--dark-brown);} .sb-teacher{background:var(--teacher);}
.sb-logo{padding:24px 22px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo-text{font-size:24px;font-weight:300;color:white;letter-spacing:-.5px;}
.sb-logo-text span{color:var(--accent-light);font-style:italic;}
.sb-badge{display:inline-block;margin-top:5px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 9px;border-radius:20px;font-weight:500;}
.sb-badge-s{color:var(--gold);background:rgba(201,151,42,.18);}
.sb-badge-t{color:#C9B8F0;background:rgba(255,255,255,.15);}
.sb-nav{padding:14px 11px;flex:1;}
.nav-sec{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:0 10px;margin:14px 0 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;margin-bottom:2px;transition:all .15s;}
.nav-item:hover{background:rgba(255,255,255,.08);color:white;}
.nav-item.active{color:white;}
.sb-student .nav-item.active{background:var(--accent);}
.sb-teacher .nav-item.active{background:rgba(255,255,255,.2);}
.sb-user{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white;flex-shrink:0;overflow:hidden;}
.av-s{background:linear-gradient(135deg,var(--accent),var(--gold));}
.av-t{background:linear-gradient(135deg,var(--teacher),var(--teacher-light));}
.sb-uname{font-size:13px;font-weight:600;color:white;}
.sb-usub{font-size:11px;color:rgba(255,255,255,.35);}
.sb-logout{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);font-size:15px;margin-left:auto;}
.sb-logout:hover{color:rgba(255,255,255,.7);}

.main-content{flex:1;overflow-y:auto;height:100vh;}
.panel{display:none;padding:40px 48px;max-width:980px;}
.panel.active{display:block;}
.pg{font-size:36px;font-weight:300;color:var(--dark-brown);line-height:1.1;margin-bottom:6px;font-family:Georgia,serif;}
.pg em{font-style:italic;color:var(--accent);}
.pg-t em{color:var(--teacher);}
.psub{font-size:13px;color:var(--warm-gray);margin-bottom:28px;}

.card{background:white;border-radius:14px;padding:22px;border:1px solid var(--stone);margin-bottom:18px;}
.card-title{font-size:13px;font-weight:600;color:var(--dark-brown);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px;}
.stat-card{background:white;border-radius:12px;padding:16px;border:1px solid var(--stone);}
.stat-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--warm-gray);margin-bottom:8px;font-weight:500;}
.stat-val{font-size:32px;font-weight:300;color:var(--dark-brown);line-height:1;margin-bottom:2px;font-family:Georgia,serif;}
.stat-det{font-size:11px;color:var(--warm-gray);}
.stat-bar-wrap{margin-top:7px;background:var(--stone);border-radius:4px;height:3px;overflow:hidden;}
.stat-bar{height:100%;border-radius:4px;}

.fg{margin-bottom:13px;}
.flab{display:block;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--warm-gray);margin-bottom:6px;font-weight:600;}
.fi{width:100%;border:1px solid var(--stone);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--dark-brown);outline:none;background:var(--warm-white);font-family:inherit;}
.fi:focus{border-color:var(--teacher);background:white;}
.fta{width:100%;border:1px solid var(--stone);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--dark-brown);outline:none;background:var(--warm-white);font-family:inherit;resize:vertical;min-height:76px;line-height:1.6;}
.fta:focus{border-color:var(--teacher);background:white;}
.fsel{width:100%;border:1px solid var(--stone);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--dark-brown);outline:none;background:var(--warm-white);font-family:inherit;cursor:pointer;}
.btn-save{padding:9px 20px;background:var(--teacher);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-save:hover{background:var(--teacher-light);}
.btn-cancel{padding:9px 15px;background:white;color:var(--mid-brown);border:1px solid var(--stone);border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-sm{padding:6px 12px;font-size:12px;font-weight:600;border:none;border-radius:7px;cursor:pointer;font-family:inherit;}
.btn-sm-t{background:var(--teacher-pale);color:var(--teacher);}
.btn-sm-t:hover{background:var(--teacher);color:white;}
.btn-sm-danger{background:#FEE;color:#C0392B;}
.btn-sm-danger:hover{background:#C0392B;color:white;}
.btn-sm-success{background:var(--success-pale);color:var(--success);}
.btn-sm-success:hover{background:var(--success);color:white;}
.btn-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
input[type=range]{width:100%;accent-color:var(--teacher);margin:5px 0;}

.mod-block{border:1px solid var(--stone);border-radius:13px;margin-bottom:14px;overflow:hidden;background:white;}
.mod-header{display:flex;align-items:center;gap:12px;padding:16px 18px;background:white;flex-wrap:wrap;}
.mod-num{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;}
.mod-info{flex:1;}
.mod-title-text{font-size:14px;font-weight:600;color:var(--dark-brown);}
.mod-sub-text{font-size:11px;color:var(--warm-gray);margin-top:1px;}
.mod-lessons{border-top:1px solid var(--stone);}
.les-row{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--stone);flex-wrap:wrap;}
.les-row:last-child{border-bottom:none;}
.les-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.les-info{flex:1;min-width:120px;}
.les-title{font-size:13px;font-weight:500;color:var(--dark-brown);}
.les-meta{font-size:11px;color:var(--warm-gray);margin-top:1px;}
.pill{font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap;}
.pill-locked{background:var(--stone);color:var(--warm-gray);}
.pill-open{background:var(--accent-pale);color:var(--accent);}

.tog{width:38px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;flex-shrink:0;}
.tog-on{background:var(--success);} .tog-off{background:var(--sand);}
.tok{position:absolute;top:3px;width:14px;height:14px;border-radius:50%;background:white;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tog-on .tok{left:21px;} .tog-off .tok{left:3px;}

.edit-form{background:var(--teacher-pale);border:1px solid rgba(74,48,128,.15);border-radius:11px;padding:18px;margin-top:0;}
.edit-form .fi,.edit-form .fta{background:white;}

.content-block{border:1px solid var(--stone);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--warm-white);}
.ct-badge{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;padding:2px 8px;border-radius:20px;}
.ct-text{background:var(--teal-pale);color:var(--teal);}
.ct-dialogue{background:var(--accent-pale);color:var(--accent);}
.ct-exercise{background:var(--gold-pale);color:var(--gold);}

.vtag{display:inline-flex;align-items:center;gap:5px;background:var(--teacher-pale);color:var(--teacher);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;margin:3px;}
.vtag-x{cursor:pointer;font-size:12px;color:var(--teacher-light);}
.vtag-x:hover{color:var(--teacher);}

.fb-card{background:white;border:1px solid var(--stone);border-radius:11px;padding:16px;margin-bottom:10px;}
.fb-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.fb-title-t{font-size:13px;font-weight:600;color:var(--dark-brown);}
.fb-date{font-size:11px;color:var(--warm-gray);}
.fb-text{font-size:13px;color:var(--mid-brown);line-height:1.6;}
.fb-stars{color:var(--gold);font-size:12px;margin-top:5px;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--warm-gray);font-size:13px;padding:2px 4px;}
.del-btn:hover{color:var(--accent);}

.skill-row{margin-bottom:11px;}
.skill-h{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;color:var(--mid-brown);}
.skill-track{background:var(--stone);border-radius:6px;height:6px;overflow:hidden;}
.skill-fill{height:100%;border-radius:6px;}

.welcome-card{background:linear-gradient(135deg,var(--dark-brown),#3a2e1a);border-radius:14px;padding:28px 32px;margin-bottom:20px;display:flex;align-items:center;gap:22px;}
.wc-title{font-size:22px;font-weight:300;color:white;margin-bottom:4px;font-family:Georgia,serif;}
.wc-title em{font-style:italic;color:var(--accent-light);}
.wc-body{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6;}
.wc-teacher{margin-top:11px;display:flex;align-items:center;gap:8px;}
.wct-av{width:26px;height:26px;border-radius:50%;background:var(--teacher);display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:600;overflow:hidden;flex-shrink:0;}
.wct-name{font-size:12px;font-weight:600;color:white;}
.wct-role{font-size:10px;color:rgba(255,255,255,.4);}
.empty-state{text-align:center;padding:44px 32px;background:white;border-radius:14px;border:1px solid var(--stone);margin-bottom:16px;}
.ei{font-size:42px;margin-bottom:11px;}
.et{font-size:22px;font-weight:300;color:var(--dark-brown);margin-bottom:5px;font-family:Georgia,serif;}
.eb{font-size:13px;color:var(--warm-gray);line-height:1.6;max-width:340px;margin:0 auto;}

.tip-box{background:var(--teal-pale);border:1px solid rgba(45,107,107,.2);border-radius:11px;padding:14px 18px;display:flex;gap:11px;margin-bottom:16px;}
.tip-icon{font-size:17px;flex-shrink:0;}
.tip-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--teal);margin-bottom:2px;}
.tip-text{font-size:12px;color:var(--mid-brown);line-height:1.5;}

.av-upload{position:relative;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;}
.av-upload input{display:none;}
.av-upload-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;font-size:11px;color:white;}
.av-upload:hover .av-upload-overlay{display:flex;}

.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--dark-brown);border-top:1px solid rgba(255,255,255,.1);z-index:1000;padding:0 4px 4px;}
.bottom-nav.teacher-nav{background:var(--teacher);}
.bottom-nav-inner{display:flex;justify-content:space-around;}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;cursor:pointer;color:rgba(255,255,255,.45);flex:1;border:none;background:none;font-family:inherit;transition:color .15s;}
.bn-item.active{color:white;}
.bn-icon{font-size:18px;line-height:1;}
.bn-label{font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:500;}

.toast{position:fixed;bottom:22px;right:22px;padding:10px 16px;border-radius:9px;font-size:13px;box-shadow:0 6px 22px rgba(0,0,0,.2);z-index:9999;display:none;color:white;}
.toast.show{display:block;}
.toast-d{background:var(--dark-brown);} .toast-t{background:var(--teacher);}

@media(max-width:800px){
  .sidebar{display:none;}
  .bottom-nav{display:block;}
  .main-content{padding-bottom:68px;}
  .panel{padding:22px 16px;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="screen active" id="login-screen">
  <div class="login-card">
    <div class="login-logo">flu<span>ency</span></div>
    <div class="login-tagline">English Learning Platform</div>
    <div class="login-tabs">
      <button class="login-tab active" id="tab-s" onclick="switchTab('student')">Student</button>
      <button class="login-tab t-tab" id="tab-t" onclick="switchTab('teacher')">Teacher</button>
    </div>
    <div id="form-student">
      <label class="fl">Your Name</label>
      <input class="fi-login" type="text" id="s-name" placeholder="Lucas" autocomplete="off">
      <label class="fl">Access Code</label>
      <input class="fi-login" type="password" id="s-pass" placeholder="••••••••" autocomplete="off">
      <div class="login-error" id="err-s">Incorrect access code.</div>
      <button class="btn-login btn-s" onclick="doLogin('student')">Start Learning →</button>
      <div class="login-hint">Code provided by your teacher, Vítor</div>
    </div>
    <div id="form-teacher" style="display:none">
      <label class="fl">Password</label>
      <input class="fi-login" type="password" id="t-pass" placeholder="••••••••" autocomplete="off">
      <div class="login-error" id="err-t">Incorrect password.</div>
      <button class="btn-login btn-t" onclick="doLogin('teacher')">Enter Dashboard →</button>
      <div class="login-hint">Teacher access only</div>
    </div>
  </div>
</div>

<div class="screen" id="app-screen">
  <aside class="sidebar sb-student" id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-text">flu<span>ency</span></div>
      <div class="sb-badge sb-badge-s" id="sb-badge">Starting Soon</div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user">
      <div class="sb-avatar av-s" id="sb-av">L</div>
      <div>
        <div class="sb-uname" id="sb-name">Lucas</div>
        <div class="sb-usub" id="sb-sub">Ready to begin</div>
      </div>
      <button class="sb-logout" onclick="doLogout()">↩</button>
    </div>
  </aside>
  <main class="main-content" id="main"></main>
  <nav class="bottom-nav" id="bottom-nav">
    <div class="bottom-nav-inner" id="bn-inner"></div>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── STATE ── */
var mode = '';
var editingMod = -1;
var editingLes = -1;
var editingContent = -1;

var defaultData = {
  student: { name:'Lucas', lessons:0, vocab:0, streak:0, fluency:null, photo:null },
  teacherPhoto: null,
  note:'', noteDate:'',
  skills:{ Speaking:0, Vocabulary:0, Grammar:0, Pronunciation:0, Writing:0 },
  feedback:[], vocabulary:[],
  modules:[
    { id:1, title:'Starting the Journey', sub:'Breaking the ice · Self-expression',
      lessons:[
        { title:'Lesson 1 — Starting the Journey', meta:'Module 1 · 50 min', unlocked:false,
          contents:[
            { type:'text', label:'Introduction', body:'Welcome to your first English lesson! Today we focus on introducing yourself naturally.' },
            { type:'dialogue', label:'Sample Dialogue', body:'A: Hi, I\'m Sarah. Nice to meet you!\nB: Nice to meet you too! I\'m Lucas. Where are you from?' },
            { type:'exercise', label:'Exercise', body:'Practice introducing yourself. Say your name, where you\'re from, and one thing you like.' }
          ]
        },
        { title:'Lesson 2 — Describing Yourself', meta:'Module 1 · 50 min', unlocked:false, contents:[] }
      ]
    },
    { id:2, title:'Travel Ready', sub:'Airports, hotels, restaurants',
      lessons:[
        { title:'Lesson 1 — At the Airport', meta:'Module 2 · 50 min', unlocked:false, contents:[] },
        { title:'Lesson 2 — Booking a Hotel', meta:'Module 2 · 50 min', unlocked:false, contents:[] }
      ]
    },
    { id:3, title:'Speaking Your Mind', sub:'Opinions · Debates · Storytelling',
      lessons:[{ title:'Lesson 1 — Expressing Opinions', meta:'Module 3 · 50 min', unlocked:false, contents:[] }]
    },
    { id:4, title:'Real-Life Conversations', sub:'Shopping, relationships, culture', lessons:[] },
    { id:5, title:'Professional English', sub:'Emails, presentations, social media', lessons:[] },
    { id:6, title:'Advanced Fluency', sub:'Idioms, humour, nuance, B2', lessons:[] }
  ]
};

var appData = JSON.parse(JSON.stringify(defaultData));

/* ── STORAGE ── */
function saveData() {
  try {
    localStorage.setItem('fluency-v3', JSON.stringify(appData));
  } catch(e) {
    console.error('Save error:', e);
  }
}

function loadData() {
  try {
    var saved = localStorage.getItem('fluency-v3');
    if (saved) {
      appData = JSON.parse(saved);
    }
  } catch(e) {
    appData = JSON.parse(JSON.stringify(defaultData));
  }
}

/* ── LOGIN ── */
function switchTab(t) {
  document.getElementById('tab-s').classList.toggle('active', t === 'student');
  document.getElementById('tab-t').classList.toggle('active', t === 'teacher');
  document.getElementById('form-student').style.display = t === 'student' ? 'block' : 'none';
  document.getElementById('form-teacher').style.display = t === 'teacher' ? 'block' : 'none';
  document.getElementById('err-s').style.display = 'none';
  document.getElementById('err-t').style.display = 'none';
}

function doLogin(m) {
  var pass = m === 'student'
    ? document.getElementById('s-pass').value
    : document.getElementById('t-pass').value;
  var correct = m === 'student' ? 'english2026' : 'teacher2026';
  if (pass !== correct) {
    document.getElementById(m === 'student' ? 'err-s' : 'err-t').style.display = 'block';
    return;
  }
  loadData();
  mode = m;
  if (m === 'student') {
    var n = document.getElementById('s-name').value.trim() || 'Lucas';
    appData.student.name = n;
    saveData();
  }
  /* clear fields */
  document.getElementById('s-name').value = '';
  document.getElementById('s-pass').value = '';
  document.getElementById('t-pass').value = '';
  document.getElementById('err-s').style.display = 'none';
  document.getElementById('err-t').style.display = 'none';

  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  buildSidebar();
  showPanel(m === 'student' ? 's-dash' : 't-dash');
}

function doLogout() {

function renderSidebarAvatar() {
  var av = document.getElementById('sb-av');
  var photo = mode === 'teacher' ? appData.teacherPhoto : appData.student.photo;
  var letter = mode === 'teacher' ? 'V' : appData.student.name.charAt(0).toUpperCase();
  av.className = 'sb-avatar ' + (mode === 'teacher' ? 'av-t' : 'av-s');
  av.innerHTML =
    '<label class="av-upload" style="width:34px;height:34px;" title="Change photo">' +
    '<input type="file" accept="image/*" onchange="uploadPhoto(this,\'' + (mode === 'teacher' ? 'teacher' : 'student') + '\')">' +
    (photo ? '<img src="' + photo + '" style="width:34px;height:34px;border-radius:50%;object-fit:cover;">' : '<span style="font-size:13px;font-weight:600;color:white">' + letter + '</span>') +
    '<div class="av-upload-overlay">📷</div>' +
    '</label>';
}

function uploadPhoto(input, who) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    if (who === 'teacher') appData.teacherPhoto = e.target.result;
    else appData.student.photo = e.target.result;
    saveData();
    renderSidebarAvatar();
    showToast('Photo updated!', true);
  };
  reader.readAsDataURL(file);
}

/* ── ROUTER ── */
function showPanel(name) {
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  document.querySelectorAll('.bn-item').forEach(function(n) { n.classList.remove('active'); });
  var el = document.getElementById('nav-' + name);
  if (el) el.classList.add('active');
  var bn = document.getElementById('bn-' + name);
  if (bn) bn.classList.add('active');
  var mc = document.getElementById('main');
  if (name === 's-dash') mc.innerHTML = sDash();
  else if (name === 's-course') mc.innerHTML = sCourse();
  else if (name === 's-progress') mc.innerHTML = sProgress();
  else if (name === 's-vocab') mc.innerHTML = sVocab();
  else if (name === 't-dash') mc.innerHTML = tDash();
  else if (name === 't-course') { editingMod = -1; editingLes = -1; editingContent = -1; mc.innerHTML = tCourse(); }
  else if (name === 't-progress') mc.innerHTML = tProgress();
  else if (name === 't-feedback') mc.innerHTML = tFeedback();
  else if (name === 't-vocab') mc.innerHTML = tVocab();
}

        '<div class="les-info"><div class="les-title">' + l.title + '</div><div class="les-meta">' + l.meta + '</div></div>' +

    '<div style="margin-bottom:16px"><button class="btn-sm btn-sm-t" onclick="showPanel(\'s-course\')">← Back to Course</button></div>' +

function tLessonEditor(mi, li) {
  var l = appData.modules[mi].lessons[li];

  var contentBlocks = contents.map(function(c, ci) {
    var cls = c.type === 'dialogue' ? 'ct-dialogue' : c.type === 'exercise' ? 'ct-exercise' : 'ct-text';
    var isEditC = editingContent === ci;
    return '<div class="content-block">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:' + (isEditC ? '12' : '0') + 'px">' +
      '<span class="ct-badge ' + cls + '">' + c.type + '</span>' +
      '<span style="font-size:13px;font-weight:600;color:var(--dark-brown);flex:1">' + c.label + '</span>' +
      '<button class="btn-sm btn-sm-t" onclick="openContentEditor(' + mi + ',' + li + ',' + ci + ')">✎</button>' +
      '<button class="btn-sm btn-sm-danger" onclick="deleteContent(' + mi + ',' + li + ',' + ci + ')">✕</button>' +
      '</div>' +
      (isEditC
        ? '<div class="fg"><label class="flab">Label</label><input class="fi" id="ced-label" value="' + c.label + '"></div>' +
          '<div class="fg"><label class="flab">Type</label><select class="fsel" id="ced-type">' +
          ['text','dialogue','exercise'].map(function(t) { return '<option' + (t === c.type ? ' selected' : '') + '>' + t + '</option>'; }).join('') +
          '</select></div>' +
          '<div class="fg"><label class="flab">Content</label><textarea class="fta" id="ced-body" style="min-height:90px">' + c.body + '</textarea></div>' +
          '<div class="btn-row"><button class="btn-save" onclick="saveContentEdit(' + mi + ',' + li + ',' + ci + ')">Save</button><button class="btn-cancel" onclick="cancelContentEdit()">Cancel</button></div>'
        : '<div style="font-size:12px;color:var(--mid-brown);white-space:pre-line;line-height:1.5;margin-top:4px">' + (c.body ? c.body.substring(0, 80) + (c.body.length > 80 ? '…' : '') : '<em style="color:var(--warm-gray)">No content yet</em>') + '</div>') +
      '</div>';
  }).join('');

  return '<div class="edit-form" style="margin-left:20px;border-radius:0 0 11px 11px">' +
    '<div class="fg"><label class="flab">Lesson Title</label><input class="fi" id="led-title-' + mi + '-' + li + '" value="' + l.title + '"></div>' +
    '<div class="fg"><label class="flab">Description</label><input class="fi" id="led-meta-' + mi + '-' + li + '" value="' + l.meta + '"></div>' +
    '<div class="btn-row" style="margin-bottom:16px"><button class="btn-save" onclick="saveLessonMeta(' + mi + ',' + li + ')">Save Title</button></div>' +
    '<div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--teacher);margin-bottom:8px">Content Blocks</div>' +
    contentBlocks +
    '<div class="btn-row" style="margin-top:10px">' +
    '<button class="btn-sm btn-sm-success" onclick="addContent(' + mi + ',' + li + ',\'text\')">+ Text</button>' +
    '<button class="btn-sm btn-sm-success" onclick="addContent(' + mi + ',' + li + ',\'dialogue\')">+ Dialogue</button>' +
    '<button class="btn-sm btn-sm-success" onclick="addContent(' + mi + ',' + li + ',\'exercise\')">+ Exercise</button>' +
    '</div>' +
    '<div class="btn-row" style="margin-top:8px"><button class="btn-cancel" onclick="cancelEdit()">Close Editor</button></div>' +
    '</div>';
}

/* ── MODULE / LESSON ACTIONS ── */
function openModuleEditor(mi) { editingMod = mi; editingLes = -1; editingContent = -1; document.getElementById('main').innerHTML = tCourse(); }
function openLessonEditor(mi, li) { editingMod = mi; editingLes = li; editingContent = -1; document.getElementById('main').innerHTML = tCourse(); }
function openContentEditor(mi, li, ci) { editingContent = ci; document.getElementById('main').innerHTML = tCourse(); }
function cancelEdit() { editingMod = -1; editingLes = -1; editingContent = -1; document.getElementById('main').innerHTML = tCourse(); }
function cancelContentEdit() { editingContent = -1; document.getElementById('main').innerHTML = tCourse(); }

function saveModuleEdit(mi) {
  var t = document.getElementById('med-title');
  var s = document.getElementById('med-sub');
  if (t) appData.modules[mi].title = t.value.trim() || appData.modules[mi].title;
  if (s) appData.modules[mi].sub = s.value.trim() || appData.modules[mi].sub;
  saveData(); editingMod = -1; editingLes = -1;
  document.getElementById('main').innerHTML = tCourse();
  showToast('Module updated!', true);
}

function saveLessonMeta(mi, li) {
  var t = document.getElementById('led-title-' + mi + '-' + li);
  var m = document.getElementById('led-meta-' + mi + '-' + li);
  if (t) appData.modules[mi].lessons[li].title = t.value.trim() || appData.modules[mi].lessons[li].title;
  if (m) appData.modules[mi].lessons[li].meta = m.value.trim() || appData.modules[mi].lessons[li].meta;
  saveData();
  showToast('Lesson saved!', true);
}

function saveContentEdit(mi, li, ci) {
  var lab = document.getElementById('ced-label');
  var typ = document.getElementById('ced-type');
  var bod = document.getElementById('ced-body');
  if (lab) appData.modules[mi].lessons[li].contents[ci].label = lab.value.trim();
  if (typ) appData.modules[mi].lessons[li].contents[ci].type = typ.value;
  if (bod) appData.modules[mi].lessons[li].contents[ci].body = bod.value.trim();
  saveData(); editingContent = -1;
  document.getElementById('main').innerHTML = tCourse();
  showToast('Content saved!', true);
}

function addContent(mi, li, type) {
  if (!appData.modules[mi].lessons[li].contents) appData.modules[mi].lessons[li].contents = [];
  appData.modules[mi].lessons[li].contents.push({ type: type, label: 'New ' + type.charAt(0).toUpperCase() + type.slice(1), body: '' });
  editingContent = appData.modules[mi].lessons[li].contents.length - 1;
  saveData(); document.getElementById('main').innerHTML = tCourse();
}

function deleteContent(mi, li, ci) {
  appData.modules[mi].lessons[li].contents.splice(ci, 1);
  editingContent = -1;
  saveData(); document.getElementById('main').innerHTML = tCourse();
  showToast('Block deleted.', true);
}

function addLesson(mi) {
  appData.modules[mi].lessons.push({ title: 'New Lesson', meta: 'Module ' + (mi + 1) + ' · 50 min', unlocked: false, contents: [] });
  editingMod = mi; editingLes = appData.modules[mi].lessons.length - 1; editingContent = -1;
  saveData(); document.getElementById('main').innerHTML = tCourse();
  showToast('Lesson added!', true);
}

function deleteLesson(mi, li) {
  if (!confirm('Delete "' + appData.modules[mi].lessons[li].title + '"?')) return;
  appData.modules[mi].lessons.splice(li, 1);
  editingMod = -1; editingLes = -1; editingContent = -1;
  saveData(); document.getElementById('main').innerHTML = tCourse();
  showToast('Lesson deleted.', true);
}

function addModule() {
  appData.modules.push({ id: appData.modules.length + 1, title: 'New Module', sub: 'Add a subtitle', lessons: [] });
  editingMod = appData.modules.length - 1; editingLes = -1; editingContent = -1;
  saveData(); document.getElementById('main').innerHTML = tCourse();
  showToast('Module added!', true);
}

function deleteModule(mi) {
  if (!confirm('Delete "' + appData.modules[mi].title + '" and all its lessons?')) return;
  appData.modules.splice(mi, 1);
  appData.modules.forEach(function(m, i) { m.id = i + 1; });
  editingMod = -1; editingLes = -1; editingContent = -1;
  saveData(); document.getElementById('main').innerHTML = tCourse();
  showToast('Module deleted.', true);
}

function toggleLesson(mi, li) {
  appData.modules[mi].lessons[li].unlocked = !appData.modules[mi].lessons[li].unlocked;
  saveData(); document.getElementById('main').innerHTML = tCourse();
  showToast(appData.modules[mi].lessons[li].unlocked ? 'Lesson unlocked!' : 'Lesson locked.', true);
}

/* ── TEACHER: PROGRESS ── */
function tProgress() {
  var s = appData.student;
  var sk = appData.skills;
  return '<div class="panel active"><div class="pg pg-t">Progress & <em>Scores</em></div><div class="psub">Update ' + s.name + '\'s stats after each session.</div>' +
    '<div class="card"><div class="card-title"><div class="dot" style="background:var(--teacher)"></div>General Stats</div>' +
    '<div class="two-col">' +
    '<div class="fg"><label class="flab">Lessons Completed</label><input class="fi" type="number" min="0" max="48" id="f-les" value="' + s.lessons + '"></div>' +
    '<div class="fg"><label class="flab">Study Streak (days)</label><input class="fi" type="number" min="0" id="f-str" value="' + s.streak + '"></div>' +
    '</div>' +
    '<div class="fg"><label class="flab">Fluency Score — <span id="fl-v">' + (s.fluency != null ? s.fluency : 0) + '</span>/100</label>' +
    '<input type="range" min="0" max="100" id="f-flu" value="' + (s.fluency || 0) + '" oninput="document.getElementById(\'fl-v\').textContent=this.value"></div>' +
    '<div class="btn-row"><button class="btn-save" onclick="saveStats()">Save Stats</button></div></div>' +
    '<div class="card"><div class="card-title"><div class="dot" style="background:var(--gold)"></div>Skill Levels</div>' +
    Object.keys(sk).map(function(k) {
      return '<div class="fg"><label class="flab">' + k + ' — <span id="sk-' + k + '-v">' + sk[k] + '%</span></label>' +
        '<input type="range" min="0" max="100" id="sk-' + k + '" value="' + sk[k] + '" oninput="document.getElementById(\'sk-' + k + '-v\').textContent=this.value+\'%\'"></div>';
    }).join('') +
    '<div class="btn-row"><button class="btn-save" onclick="saveSkills()">Save Skills</button></div></div></div>';
}

function saveStats() {
  var les = document.getElementById('f-les');
  var str = document.getElementById('f-str');
  var flu = document.getElementById('f-flu');
  if (les) appData.student.lessons = parseInt(les.value) || 0;
  if (str) appData.student.streak = parseInt(str.value) || 0;
  if (flu) appData.student.fluency = parseInt(flu.value);
  saveData(); showToast('Stats saved!', true);
}

function saveSkills() {
  Object.keys(appData.skills).forEach(function(k) {
    var el = document.getElementById('sk-' + k);
    if (el) appData.skills[k] = parseInt(el.value) || 0;
  });
  saveData(); showToast('Skills updated!', true);
}

/* ── TEACHER: FEEDBACK ── */
function tFeedback() {
  var fbCards = appData.feedback.map(function(f, i) {
    return '<div class="fb-card"><div class="fb-hd"><div class="fb-title-t">' + f.title + '</div>' +
      '<div style="display:flex;align-items:center;gap:8px"><div class="fb-date">' + f.date + '</div>' +
      '<button class="del-btn" onclick="delFeedback(' + i + ')">✕</button></div></div>' +
      '<div class="fb-text">' + f.text + '</div>' +
      '<div class="fb-stars">' + '★'.repeat(f.stars) + '☆'.repeat(5 - f.stars) + '</div></div>';
  }).join('');

  return '<div class="panel active"><div class="pg pg-t">Feedback & <em>Notes</em></div><div class="psub">Leave notes and feedback for ' + appData.student.name + '.</div>' +
    '<div class="card"><div class="card-title"><div class="dot" style="background:var(--teacher)"></div>Dashboard Note</div>' +
    '<div class="fg"><label class="flab">Shown on ' + appData.student.name + '\'s home screen</label><textarea class="fta" id="f-note" placeholder="Write a personal note…">' + (appData.note || '') + '</textarea></div>' +
    '<div class="btn-row"><button class="btn-save" onclick="saveNote()">Save Note</button>' + (appData.note ? '<button class="btn-cancel" onclick="clearNote()">Clear</button>' : '') + '</div></div>' +
    '<div class="card"><div class="card-title"><div class="dot"></div>Add Lesson Feedback</div>' +
    '<div class="fg"><label class="flab">Title</label><input class="fi" id="fb-ti" placeholder="e.g. Lesson Review — M1 L1"></div>' +
    '<div class="fg" style="margin-top:10px"><label class="flab">Feedback</label><textarea class="fta" id="fb-tx" placeholder="Your feedback…"></textarea></div>' +
    '<div class="fg" style="margin-top:10px"><label class="flab">Rating — <span id="fb-sv">★★★★☆</span></label><input type="range" min="1" max="5" id="fb-st" value="4" oninput="updateStars(this.value)"></div>' +
    '<div class="btn-row"><button class="btn-save" onclick="addFeedback()">Add Feedback</button></div></div>' +
    (appData.feedback.length > 0 ? '<div class="card"><div class="card-title"><div class="dot" style="background:var(--success)"></div>Saved Feedback (' + appData.feedback.length + ')</div>' + fbCards + '</div>' : '') +
    '</div>';
}

function saveNote() { var el = document.getElementById('f-note'); if (!el) return; appData.note = el.value.trim(); appData.noteDate = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' }); saveData(); showPanel('t-feedback'); showToast('Note saved!', true); }
function clearNote() { appData.note = ''; appData.noteDate = ''; saveData(); showPanel('t-feedback'); showToast('Note cleared.', true); }
function updateStars(v) { var el = document.getElementById('fb-sv'); if (el) el.textContent = '★'.repeat(v) + '☆'.repeat(5 - v); }
function addFeedback() {
  var ti = document.getElementById('fb-ti');
  var tx = document.getElementById('fb-tx');
  var st = document.getElementById('fb-st');
  if (!ti || !tx || !ti.value.trim() || !tx.value.trim()) { showToast('Fill in title and feedback.'); return; }
  appData.feedback.push({ title: ti.value.trim(), text: tx.value.trim(), stars: parseInt(st ? st.value : 4) || 4, date: new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' }) });
  saveData(); showPanel('t-feedback'); showToast('Feedback added!', true);
}
function delFeedback(i) { appData.feedback.splice(i, 1); saveData(); showPanel('t-feedback'); showToast('Deleted.', true); }

/* ── TEACHER: VOCAB ── */
function tVocab() {
  var tags = appData.vocabulary.map(function(v, i) {
    return '<span class="vtag">' + v.word + '<span class="vtag-x" onclick="removeVocab(' + i + ')">×</span></span>';
  }).join('');
  return '<div class="panel active"><div class="pg pg-t">Vocabulary <em>Editor</em></div><div class="psub">Add words for ' + appData.student.name + ' from each lesson.</div>' +
    '<div class="card"><div class="card-title"><div class="dot" style="background:var(--teacher)"></div>Add New Word</div>' +
    '<div class="two-col">' +
    '<div class="fg"><label class="flab">Word / Phrase</label><input class="fi" id="v-w" placeholder="e.g. approximately"></div>' +
    '<div class="fg"><label class="flab">Type</label><select class="fsel" id="v-t"><option>noun</option><option>verb</option><option>adjective</option><option>adverb</option><option>phrase</option><option>phrasal verb</option><option>idiom</option></select></div>' +
    '</div>' +
    '<div class="fg"><label class="flab">Definition</label><input class="fi" id="v-d" placeholder="Short, clear definition…"></div>' +
    '<div class="fg" style="margin-top:10px"><label class="flab">Example (optional)</label><input class="fi" id="v-e" placeholder="e.g. The flight takes approximately 3 hours."></div>' +
    '<div class="btn-row" style="margin-top:8px"><button class="btn-save" onclick="addVocab()">Add Word</button></div></div>' +
    (appData.vocabulary.length > 0 ? '<div class="card"><div class="card-title"><div class="dot"></div>Words Added (' + appData.vocabulary.length + ')</div><div>' + tags + '</div></div>' : '') +
    '</div>';
}

function addVocab() {
  var w = document.getElementById('v-w');
  var t = document.getElementById('v-t');
  var d = document.getElementById('v-d');
  var e = document.getElementById('v-e');
  if (!w || !d || !w.value.trim() || !d.value.trim()) { showToast('Word and definition required.'); return; }
  appData.vocabulary.push({ word: w.value.trim(), type: t ? t.value : 'noun', def: d.value.trim(), ex: e ? e.value.trim() : '' });
  appData.student.vocab = appData.vocabulary.length;
  saveData(); showPanel('t-vocab'); showToast('"' + w.value.trim() + '" added!', true);
}

function removeVocab(i) { appData.vocabulary.splice(i, 1); appData.student.vocab = appData.vocabulary.length; saveData(); showPanel('t-vocab'); showToast('Word removed.', true); }

/* ── UTILS ── */
function showToast(msg, isT) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (isT ? 'toast-t' : 'toast-d');
  clearTimeout(window._t);
  window._t = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('login-screen').classList.contains('active')) {
    doLogin(document.getElementById('tab-t').classList.contains('active') ? 'teacher' : 'student');
  }
});
</script>
</body>
</html>
